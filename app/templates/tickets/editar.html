{% extends "base.html" %}
{% block title %}Editar Ticket{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <h2 class="text-warning mb-4">Editar Ticket</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" name="titulo" class="form-control" value="{{ ticket.titulo }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="4" required>{{ ticket.descripcion }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Estado</label>
                    <select name="estado" class="form-select">
                        <option value="abierto" {% if ticket.estado == 'abierto' %}selected{% endif %}>Abierto</option>
                        <option value="en proceso" {% if ticket.estado == 'en proceso' %}selected{% endif %}>En proceso</option>
                        <option value="cerrado" {% if ticket.estado == 'cerrado' %}selected{% endif %}>Cerrado</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Prioridad</label>
                    <select name="prioridad" class="form-select">
                        <option value="baja" {% if ticket.prioridad == 'baja' %}selected{% endif %}>Baja</option>
                        <option value="media" {% if ticket.prioridad == 'media' %}selected{% endif %}>Media</option>
                        <option value="alta" {% if ticket.prioridad == 'alta' %}selected{% endif %}>Alta</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Categoría</label>
                    <select name="categoria_id" class="form-select" required>
                        {% for c in categorias %}
                            <option value="{{ c.id }}" {% if ticket.categoria_id == c.id %}selected{% endif %}>
                                {{ c.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            {% if current_user.rol == "admin" %}
            <div class="mb-3">
                <label class="form-label">Asignar a usuario</label>
                <select name="usuario_id" class="form-select">
                    {% for u in usuarios %}
                        <option value="{{ u.id }}" {% if ticket.usuario_id == u.id %}selected{% endif %}>
                            {{ u.nombre }} - {{ u.email }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <button class="btn btn-warning text-dark fw-semibold">Actualizar</button>
            <a href="{{ url_for('tickets.listar_tickets') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
