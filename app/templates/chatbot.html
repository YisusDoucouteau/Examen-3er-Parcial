{% extends "base.html" %}
{% block title %}Chatbot IA{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body">
        <h2 class="mb-3">Chatbot Inteligente</h2>
        <p class="text-muted">Haz preguntas sobre tickets y categorías.</p>

        <div id="chat-box" class="border rounded p-3 mb-3 bg-light" style="min-height: 250px; max-height: 400px; overflow-y: auto;">
            <p><strong>IA:</strong> Hola, puedes preguntarme cosas como “¿Cuántos tickets abiertos hay?”</p>
        </div>

        <div class="input-group">
            <input type="text" id="pregunta" class="form-control" placeholder="Escribe tu pregunta">
            <button class="btn btn-primary" onclick="enviarPregunta()">Enviar</button>
        </div>
    </div>
</div>

<script>
async function enviarPregunta() {
    const input = document.getElementById("pregunta");
    const pregunta = input.value.trim();

    if (!pregunta) return;

    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<p><strong>Tú:</strong> ${pregunta}</p>`;

    const response = await fetch("/chatbot", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ pregunta })
    });

    const data = await response.json();
    chatBox.innerHTML += `<p><strong>IA:</strong> ${data.respuesta}</p>`;

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
{% endblock %}
