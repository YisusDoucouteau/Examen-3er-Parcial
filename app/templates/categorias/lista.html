<h2>Categorias</h2>

<a href="/categorias/crear">Nueva Categoria</a>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Acciones</th>
</tr>

{% for c in categorias %}

<tr>
<td>{{c.id}}</td>
<td>{{c.nombre}}</td>

<td>
<a href="/categorias/editar/{{c.id}}">Editar</a>
<a href="/categorias/eliminar/{{c.id}}">Eliminar</a>
</td>

</tr>

{% endfor %}

</table>
